services:
  sde:
    image: sorbotics/sorba-sde:latest
    container_name: my-sde
    cap_add:
      - NET_ADMIN
    restart: always
    volumes:
      - sde-volume:/opt
    ports:
      - 443:443/tcp
      - 502:502/tcp
      - 1883:1883/tcp
      - 49321:49321/tcp
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      - sorbotics

volumes:
  sde-volume:
    driver: local

networks:
  sorbotics: